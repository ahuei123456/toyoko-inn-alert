<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} | Toyoko Admin</title>
  <style>
    :root {
      --bg: #f6f8fb;
      --card: #ffffff;
      --text: #17202a;
      --muted: #5d6d7e;
      --line: #d6dde8;
      --blue: #1d6fdc;
      --green: #118a4b;
      --red: #b62324;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 24px 16px 40px;
    }
    .topbar {
      background: var(--card);
      border-bottom: 1px solid var(--line);
    }
    .topbar-inner {
      max-width: 1100px;
      margin: 0 auto;
      padding: 14px 16px;
      display: flex;
      gap: 16px;
      align-items: center;
    }
    .brand {
      font-weight: 700;
      margin-right: 8px;
    }
    .nav a {
      color: var(--blue);
      text-decoration: none;
      margin-right: 12px;
      font-weight: 600;
    }
    h1 { margin: 0 0 16px; font-size: 28px; }
    h2 { margin: 0 0 12px; font-size: 20px; }
    .card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 16px;
      margin-bottom: 16px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
    }
    .metric-label {
      color: var(--muted);
      font-size: 14px;
      margin-bottom: 6px;
    }
    .metric-value {
      font-size: 30px;
      font-weight: 700;
      line-height: 1;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      padding: 10px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      vertical-align: top;
    }
    th { background: #f1f5fb; }
    .status {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid currentColor;
    }
    .status.pending { color: #985d00; }
    .status.sent { color: var(--green); }
    .status.failed { color: var(--red); }
    .status.active { color: var(--green); }
    .status.revoked { color: var(--red); }
    form.inline { display: inline; }
    input, select, button {
      padding: 8px 10px;
      border-radius: 8px;
      border: 1px solid var(--line);
      font-size: 14px;
    }
    button {
      background: var(--blue);
      color: #fff;
      border: 0;
      cursor: pointer;
      font-weight: 600;
    }
    button.secondary {
      background: #6c7a89;
    }
    .muted { color: var(--muted); }
    .flash {
      padding: 12px;
      border-radius: 8px;
      background: #e7f2ff;
      border: 1px solid #b6d5ff;
      margin-bottom: 12px;
      word-break: break-all;
    }
    pre.payload {
      max-width: 380px;
      max-height: 160px;
      overflow: auto;
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      color: #203040;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div class="brand">Toyoko Admin</div>
      <nav class="nav">
        <a href="/admin">Dashboard</a>
        <a href="/admin/api-keys">API Keys</a>
        <a href="/admin/notifications">Notifications</a>
      </nav>
    </div>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
