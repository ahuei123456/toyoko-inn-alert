services:
  api:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      # Persist the SQLite database
      - ./toyoko.db:/app/toyoko.db
    environment:
      - TOYOKO_API_KEY=${TOYOKO_API_KEY:-default-secret-key}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
